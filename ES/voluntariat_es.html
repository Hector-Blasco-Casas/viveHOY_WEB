                <li><a href="contacte_es.html"><i class="fa-solid fa-envelope"></i> Contacto</a></li>

            <a href="../CA/voluntariat_ca.html" title="Català"><img src="../IMG/BANDERES/CA.png" alt="CA"></a>

            <a href="../EN/voluntariat_en.html" title="English"><img src="../IMG/BANDERES/EN.png" alt="EN"></a>

    <!-- Contingut principal de la pàgina -->
    <main>
        <img src="../IMG/logo-sensefons.webp" alt="Logo viveHOY" class="logo-principal"> <!-- Logo del lloc web -->
        <h2 style="font-style: italic;">Hazte Voluntario</h2> <!-- Títol del formulari -->
        <p>¿Quieres formar parte de nuestro equipo y ayudar a los jóvenes? <strong>Apúntate como voluntario</strong> y súmate a nuestra causa.</p> <!-- Text fet per IA -->

        <form action="#" method="get"> <!-- Formulari per introduir les dades de voluntariat -->
            <label for="nom">Nombre:</label> <!-- Text del primer camp del formulari -->
            <input type="text" id="nom" name="nom" required> <!-- Camp per introduir el nom -->

            <label for="cognoms">Apellidos:</label> <!-- Text del segon camp del formulari -->
            <input type="text" id="cognoms" name="cognoms" required> <!-- Camp per introduir els cognoms -->

            <label for="residencia">Lugar de residencia:</label> <!-- Text del tercer camp del formulari -->
            <input type="text" id="residencia" name="residencia" required> <!-- Camp per introduir el lloc de residència -->

            <label for="estudis">Estudios cursados:</label> <!-- Text del quart camp del formulari -->
            <input type="text" id="estudis" name="estudis" required> <!-- Camp per introduir els estudis cursats -->

            <button type="submit">Enviar solicitud</button> <!-- Botó per enviar la sol·licitud -->
        </form>
    </main>
