    <!-- Contingut principal de la pàgina -->
    <main>
        <img src="../IMG/logo-sensefons.webp" alt="Logo viveHOY" class="logo-principal">
        <h2>Contacta con nosotros</h2>
        <p>¿Tienes alguna duda, necesitas ayuda o quieres colaborar? Rellena el formulario y te responderemos lo antes posible.</p> <!-- Text fet per IA -->
        
        <form action="#" method="get">
            <label for="nom">Nombre:</label>
            <input type="text" id="nom" name="nom" required>

            <label for="email">Correo electrónico:</label>
            <input type="email" id="email" name="email" required>

            <label for="missatge">Mensaje:</label>
            <textarea id="missatge" name="missatge" rows="5" required></textarea>

            <button type="submit">Enviar mensaje</button>
        </form>
    </main>
