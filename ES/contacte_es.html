    <title>viveHOY - Contacto</title> <!-- Títol del lloc -->
    <link rel="stylesheet" href="../CSS/style.css"> <!-- Enllaç amb l'arxiu CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"> <!-- Enllaçades icones de FontAwesome -->
</head>

<body>
    <!-- Capçalera del lloc web-->
    <header>
        <div class="logotip">
            <a href="index_es.html"><img src="../IMG/logo-sensefons.webp" alt="Logo viveHOY"></a>
        </div>
        <!-- Navegació del lloc web-->
        <nav>
            <ul>
                <li><a href="index_es.html"><i class="fa-solid fa-house"></i> Inicio</a></li>
                <li><a href="nosaltres_es.html"><i class="fa-solid fa-users"></i> Sobre nosotros</a></li>
                <li><a href="donar_es.html"><i class="fa-solid fa-hand-holding-heart"></i> Donar</a></li>
                <li><a href="contacte_es.html">Contacto</a></li>
            </ul>
        </nav>
        <!-- Botons de canvi d'idioma -->
        <div class="canvi-idioma">
            <a href="../CA/contacte_ca.html" title="Català"><img src="../IMG/BANDERES/CA.png" alt="CA"></a>
            <a href="contacte_es.html" title="Español"><img src="../IMG/BANDERES/ES.png" alt="ES"></a>
            <a href="../EN/contacte_en.html" title="English"><img src="../IMG/BANDERES/EN.png" alt="EN"></a>
        </div>
    </header>

    <!-- Contingut principal de la pàgina -->
    <main>
        <img src="../IMG/logo-sensefons.webp" alt="Logo viveHOY" class="logo-principal"> <!-- Logo del lloc web -->
        <h2 style="font-style: italic;">Contacta con nosotros</h2> <!-- Títol del formulari -->
        <p>¿Tienes alguna duda, necesitas ayuda o quieres colaborar? <strong>Rellena el formulario</strong> y te
            responderemos lo antes posible.</p> <!-- Text fet per IA -->

        <form action="#" method="get"> <!-- Formulari per introduir les dades del contacte -->
            <label for="nom">Nombre:</label> <!-- Text del primer camp del formulari -->
            <input type="text" id="nom" name="nom" required> <!-- Camp per introduir el nom -->

            <label for="email">Correo electrónico:</label> <!-- Text del segon camp del formulari -->
            <input type="email" id="email" name="email" required> <!-- Camp per introduir el correu electrònic -->

            <label for="missatge">Mensaje:</label> <!-- Text del tercer camp del formulari -->
            <textarea id="missatge" name="missatge" rows="5" required></textarea> <!-- Camp per introduir el missatge -->

            <button type="submit">Enviar mensaje</button> <!-- Botó per enviar el missatge -->
        </form>
    </main>

    <!-- Peu de pàgina del lloc web -->
    <footer>
        <p>&copy; 2026 ONG viveHOY. Todos los derechos reservados.</p>
    </footer>
</body>
