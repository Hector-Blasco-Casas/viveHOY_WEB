        </div>
    </header>

    <!-- Contingut principal de la pàgina -->
    <main>
        <h2>Haz un donativo</h2>
        <p><strong>Tu aportación nos ayuda a mantener nuestros servicios activos</strong> y a seguir ayudando a más
            jóvenes a encontrar un hogar.</p> <!-- Text fet per IA -->

        <form action="#" method="get"> <!-- Formulari per introduir les dades del donatiu -->
            <label for="quantitat">Cantidad a donar (€):</label> <!-- Text del primer camp del formulari-->
            <input type="number" id="quantitat" name="quantitat" min="1" required> <!-- Camp per introduir la quantitat a donar-->

            <label for="nom">Nombre completo:</label> <!-- Text del segon camp del formulari-->
            <input type="text" id="nom" name="nom" required> <!-- Camp per introduir el nom complet-->

            <label for="email">Correo electrónico:</label> <!-- Text del tercer camp del formulari-->
            <input type="email" id="email" name="email" required> <!-- Camp per introduir el correu electrònic-->

            <br>
            <fieldset style="border: 1px solid #ccc; padding: 15px; margin-top: 20px;">
                <legend style="color: #0F57A3; font-weight: bold;">Datos bancarios</legend> <!-- Text del títol del fieldset-->
                <label for="titular">Titular de la tarjeta:</label> <!-- Text del quart camp del formulari-->
                <input type="text" id="titular" name="titular" required> <!-- Camp per introduir el titular de la targeta -->

                <label for="targeta">Número de tarjeta:</label> <!-- Text del cinquè camp del formulari -->
                <input type="text" id="targeta" name="targeta" pattern="[0-9]{16}" placeholder="1234123412341234"
                    required> <!-- Camp per introduir el número de la targeta -->

                <label for="caducitat">Fecha de caducidad (MM/AA):</label> <!-- Text del sisè camp del formulari -->
                <input type="text" id="caducitat" name="caducitat" pattern="(0[1-9]|1[0-2])\/[0-9]{2}"
                    placeholder="MM/AA" required> <!-- Camp per introduir la data de caducitat -->

                <label for="cvv">CVV:</label> <!-- Text del setè camp del formulari -->
                <input type="text" id="cvv" name="cvv" pattern="[0-9]{3,4}" placeholder="123" required> <!-- Camp per introduir el CVV -->
            </fieldset>

            <button type="submit">Donar ahora</button> <!-- Botó per enviar el donatiu -->
        </form>
    </main>
