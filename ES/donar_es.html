    <title>viveHOY - Donar</title> <!-- Títol del lloc -->
    <link rel="stylesheet" href="../CSS/style.css"> <!-- Enllaç amb l'arxiu CSS -->
</head>
<body>
    <!-- Capçalera del lloc web-->
    <header>
        <div class="logotip">
            <a href="index_es.html"><img src="../IMG/logo-sensefons.webp" alt="Logo viveHOY"></a>
        </div>
        <!-- Navegació del lloc web-->
        <nav>
            <ul>
                <li><a href="index_es.html">Inicio</a></li>
                <li><a href="nosaltres_es.html">Sobre nosotros</a></li>
                <li><a href="donar_es.html">Donar</a></li>
                <li><a href="contacte_es.html">Contacto</a></li>
            </ul>
        </nav>
        <!-- Botons de canvi d'idioma -->
        <div class="canvi-idioma">
            <a href="../CA/donar_ca.html" title="Català"><img src="../IMG/BANDERES/CA.png" alt="CA"></a>
            <a href="donar_es.html" title="Español"><img src="../IMG/BANDERES/ES.png" alt="ES"></a>
            <a href="../EN/donar_en.html" title="English"><img src="../IMG/BANDERES/EN.png" alt="EN"></a>
        </div>
    </header>

    <!-- Contingut principal de la pàgina -->
    <main>
        <h2>Haz un donativo</h2>
        <p>Tu aportación nos ayuda a mantener nuestros servicios activos y a seguir ayudando a más jóvenes a encontrar un hogar.</p> <!-- Text fet per IA -->
        
        <form action="#" method="get">
            <label for="quantitat">Cantidad a donar (€):</label>
            <input type="number" id="quantitat" name="quantitat" min="1" required>

            <label for="nom">Nombre completo:</label>
            <input type="text" id="nom" name="nom" required>

            <label for="email">Correo electrónico:</label>
            <input type="email" id="email" name="email" required>

            <h3 style="margin-top: 30px;">Datos bancarios</h3>
            <label for="titular">Titular de la tarjeta:</label>
            <input type="text" id="titular" name="titular" required>

            <label for="targeta">Número de tarjeta:</label>
            <input type="text" id="targeta" name="targeta" pattern="[0-9]{16}" placeholder="1234123412341234" required>

            <label for="caducitat">Fecha de caducidad (MM/AA):</label>
            <input type="text" id="caducitat" name="caducitat" pattern="(0[1-9]|1[0-2])\/[0-9]{2}" placeholder="MM/AA" required>

            <label for="cvv">CVV:</label>
            <input type="text" id="cvv" name="cvv" pattern="[0-9]{3,4}" placeholder="123" required>

            <button type="submit">Donar ahora</button>
        </form>
    </main>

    <!-- Peu de pàgina del lloc web -->
    <footer>
        <p>&copy; 2026 ONG viveHOY. Todos los derechos reservados.</p>
    </footer>
</body>
