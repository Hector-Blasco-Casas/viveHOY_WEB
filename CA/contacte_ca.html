        <p>Tens algun dubte, necessites ajuda o vols col·laborar? Omple el formulari i et respondrem al més aviat possible.</p>
        
        <form action="#" method="get">
            <label for="nom">Nom:</label>
            <input type="text" id="nom" name="nom" required>

            <input type="email" id="email" name="email" required>

            <label for="missatge">Missatge:</label>
            <textarea id="missatge" name="missatge" rows="5" required></textarea>

            <button type="submit">Enviar missatge</button>
