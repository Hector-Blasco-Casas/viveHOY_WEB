    <title>viveHOY - Contacte</title> <!-- Títol del lloc -->

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"> <!-- Enllaçades icones de FontAwesome -->
    <link rel="icon" type="image/x-icon" href="../IMG/webicon.ico"> <!-- Icona de la web -->
</head>

<body>
    <!-- Capçalera del lloc web-->
    <header>
        <div class="logotip">
            <a href="../index.html"><img src="../IMG/logo-sensefons.png" alt="Logo viveHOY"></a>
        </div>
        <!-- Navegació del lloc web-->
        <nav>
            <ul>
                <li><a href="../index.html"><i class="fa-solid fa-house"></i> Inici</a></li>
                <li><a href="./nosaltres_ca.html"><i class="fa-solid fa-users"></i> Sobre nosaltres</a></li>
                <li><a href="./donar_ca.html"><i class="fa-solid fa-hand-holding-heart"></i> Donar</a></li>
                <li><a href="./voluntariat_ca.html"><i class="fa-solid fa-handshake-angle"></i> Voluntariat</a></li>
                <li><a href="./projectes_ca.html"><i class="fa-solid fa-border-all"></i> Projectes</a></li>
                <li><a href="./contacte_ca.html"><i class="fa-solid fa-envelope"></i> Contacte</a></li>
            </ul>
        </nav>
        <!-- Botons de canvi d'idioma -->
        <div class="canvi-idioma">
            <a href="./contacte_ca.html" title="Català"><img src="../IMG/BANDERES/CA.png" alt="Català"></a>
            <a href="../ES/contacte_es.html" title="Español"><img src="../IMG/BANDERES/ES.png" alt="Español"></a>
            <a href="../EN/contacte_en.html" title="English"><img src="../IMG/BANDERES/EN.png" alt="English"></a>
        </div>
    </header>

    <!-- Contingut principal de la pàgina -->
    <main>
        <img src="../IMG/logo-sensefons.png" alt="Logo viveHOY" class="logo-principal"> <!-- Logo del lloc web -->
        <h2 style="font-style: italic;">Contacta amb nosaltres</h2> <!-- Títol del formulari -->
        <p>Tens algun dubte, necessites ajuda o vols col·laborar? <strong>Omple el formulari</strong> i et respondrem al
            més aviat possible.</p> <!-- Text fet per IA -->

        <form action="#" method="get"> <!-- Formulari per introduir les dades del contacte -->
            <label for="nom">Nom:</label> <!-- Text del primer camp del formulari -->
            <input type="text" name="nom" required> <!-- Camp per introduir el nom -->

            <label for="email">Correu electrònic:</label> <!-- Text del segon camp del formulari -->
            <input type="email" name="email" required> <!-- Camp per introduir el correu electrònic -->

            <label for="missatge">Missatge:</label> <!-- Text del tercer camp del formulari -->
            <textarea name="missatge" rows="5" required></textarea> <!-- Camp per introduir el missatge -->

            <button type="submit">Enviar missatge</button> <!-- Botó per enviar el missatge -->
        </form>
    </main>

    <!-- Peu de pàgina del lloc web -->
    <footer>
        <p>&copy; 2026 ONG viveHOY. Tots els drets reservats.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
