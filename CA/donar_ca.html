    <main>
        <h2>Fes un donatiu</h2>
        <p>La teva aportació ens ajuda a mantenir els nostres serveis actius i a seguir ajudant a més joves a trobar una llar.</p>
        
        <form action="#" method="get">
            <label for="quantitat">Quantitat a donar (€):</label>
            <input type="number" id="quantitat" name="quantitat" min="1" required>

            <label for="nom">Nom complet:</label>
            <input type="text" id="nom" name="nom" required>

            <label for="email">Correu electrònic:</label>
            <input type="email" id="email" name="email" required>

            <button type="submit">Donar ara</button>
        </form>
    </main>
