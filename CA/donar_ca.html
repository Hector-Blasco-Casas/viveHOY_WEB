        </div>

    <main>
        <h2>Fes un donatiu</h2>
        <p>La teva aportació ens ajuda a mantenir els nostres serveis actius i a seguir ajudant a més joves a trobar una llar.</p>
        
        <form action="#" method="get">
            <label for="quantitat">Quantitat a donar (€):</label>
            <input type="number" id="quantitat" name="quantitat" min="1" required>

            <label for="nom">Nom complet:</label>
            <input type="text" id="nom" name="nom" required>

            <label for="email">Correu electrònic:</label>
            <input type="email" id="email" name="email" required>

            <h3 style="margin-top: 30px;">Dades bancàries</h3>
            <label for="titular">Titular de la targeta:</label>
            <input type="text" id="titular" name="titular" required>

            <label for="targeta">Número de targeta:</label>
            <input type="text" id="targeta" name="targeta" pattern="[0-9]{16}" placeholder="1234123412341234" required>

            <label for="caducitat">Data de caducitat (MM/AA):</label>
            <input type="text" id="caducitat" name="caducitat" pattern="(0[1-9]|1[0-2])\/[0-9]{2}" placeholder="MM/AA" required>

            <label for="cvv">CVV:</label>
            <input type="text" id="cvv" name="cvv" pattern="[0-9]{3,4}" placeholder="123" required>

            <button type="submit">Donar ara</button>
        </form>
    </main>

    </footer>
</body>
