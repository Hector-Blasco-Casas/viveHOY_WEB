    <header>
        <div class="logo">
            <a href="index_en.html"><img src="../IMG/logo-sensefons.webp" alt="viveHOY Logo"></a>
        </div>
        <nav>
            <ul>

            <a href="../ES/contacte_es.html" title="Español"><img src="../IMG/BANDERES/ES.png" alt="ES"></a>
            <a href="contacte_en.html" title="English"><img src="../IMG/BANDERES/EN.png" alt="EN"></a>
        </div>
    </header>

    <main>
        <img src="../IMG/logo-sensefons.webp" alt="Logo viveHOY" class="main-logo">
        <h2>Contact us</h2>
        <p>Do you have any questions, need help or want to collaborate? Fill out the form and we will get back to you as soon as possible.</p>
        
        <form action="#" method="get">
            <label for="nom">Name:</label>
            <input type="text" id="nom" name="nom" required>

            <label for="email">Email address:</label>
            <input type="email" id="email" name="email" required>

            <label for="missatge">Message:</label>
            <textarea id="missatge" name="missatge" rows="5" required></textarea>

            <button type="submit">Send message</button>
        </form>
    </main>

    <footer>

    </footer>
