<!DOCTYPE html>
<html lang="en"> <!-- Fiquem que el lloc sigui en anglès -->

<head>
    <!-- Metadades de la pàgina que fica Visual Studio Code quan fiquem la comanda "!" -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>viveHOY - Contact</title> <!-- Títol del lloc -->
    <link rel="stylesheet" href="../CSS/style.css"> <!-- Enllaç amb l'arxiu CSS -->
</head>

<body>
    <!-- Capçalera del lloc web-->
    <header>
        <div class="logotip">
            <a href="index_en.html"><img src="../IMG/logo-sensefons.webp" alt="viveHOY Logo"></a>
        </div>
        <!-- Navegació del lloc web-->
        <nav>
            <ul>
                <li><a href="index_en.html">Home</a></li>
                <li><a href="nosaltres.html">About us</a></li>
                <li><a href="donar_en.html">Donate</a></li>
                <li><a href="contacte_en.html">Contact</a></li>
            </ul>
        </nav>
        <!-- Botons de canvi d'idioma -->
        <div class="canvi-idioma">
            <a href="../CA/contacte_ca.html" title="Català"><img src="../IMG/BANDERES/CA.png" alt="CA"></a>
            <a href="../ES/contacte_es.html" title="Español"><img src="../IMG/BANDERES/ES.png" alt="ES"></a>
            <a href="contacte_en.html" title="English"><img src="../IMG/BANDERES/EN.png" alt="EN"></a>
        </div>
    </header>

    <!-- Contingut principal de la pàgina -->
    <main>
        <img src="../IMG/logo-sensefons.webp" alt="Logo viveHOY" class="logo-principal"> <!-- Logo del lloc web -->
        <h2>Contact us</h2> <!-- Títol del formulari -->
        <p>Do you have any questions, need help or want to collaborate? <strong>Fill out the form</strong> and we will
            get back to you as soon as possible.</p> <!-- Text fet per IA -->

        <form action="#" method="get"> <!-- Formulari per introduir les dades del contacte -->
            <label for="nom">Name:</label> <!-- Text del primer camp del formulari -->
            <input type="text" id="nom" name="nom" required> <!-- Camp per introduir el nom -->

            <label for="email">Email address:</label> <!-- Text del segon camp del formulari -->
            <input type="email" id="email" name="email" required> <!-- Camp per introduir el correu electrònic -->

            <label for="missatge">Message:</label> <!-- Text del tercer camp del formulari -->
            <textarea id="missatge" name="missatge" rows="5" required></textarea> <!-- Camp per introduir el missatge -->

            <button type="submit">Send message</button> <!-- Botó per enviar el missatge -->
        </form>
    </main>

    <!-- Peu de pàgina del lloc web -->
    <footer>
        <p>&copy; 2026 viveHOY NGO. All rights reserved.</p>
    </footer>
</body>

</html>
