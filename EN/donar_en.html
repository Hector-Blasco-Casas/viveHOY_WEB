<!DOCTYPE html>
<html lang="en"> <!-- Fiquem que el lloc sigui en anglès -->

<head>
    <!-- Metadades de la pàgina que fica Visual Studio Code quan fiquem la comanda "!" -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>viveHOY - Donate</title> <!-- Títol del lloc -->
    <link rel="stylesheet" href="../CSS/style.css"> <!-- Enllaç amb l'arxiu CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"> <!-- Enllaçades icones de FontAwesome -->
    <link rel="icon" type="image/x-icon" href="../IMG/webicon.ico"> <!-- Icona de la web -->
</head>

<body>
    <!-- Capçalera del lloc web-->
    <header>
        <div class="logotip">
            <a href="./index_en.html"><img src="../IMG/logo-sensefons.png" alt="viveHOY Logo"></a>
        </div>
        <!-- Navegació del lloc web-->
        <nav>
            <ul>
                <li><a href="./index_en.html"><i class="fa-solid fa-house"></i> Home</a></li>
                <li><a href="./nosaltres_en.html"><i class="fa-solid fa-users"></i> About us</a></li>
                <li><a href="./donar_en.html"><i class="fa-solid fa-hand-holding-heart"></i> Donate</a></li>
                <li><a href="./voluntariat_en.html"><i class="fa-solid fa-handshake-angle"></i> Volunteer</a></li>
                <li><a href="./contacte_en.html"><i class="fa-solid fa-envelope"></i> Contact</a></li>
            </ul>
        </nav>
        <!-- Botons de canvi d'idioma -->
        <div class="canvi-idioma">
            <a href="../CA/donar_ca.html" title="Català"><img src="../IMG/BANDERES/CA.png" alt="Català"></a>
            <a href="../ES/donar_es.html" title="Español"><img src="../IMG/BANDERES/ES.png" alt="Español"></a>
            <a href="./donar_en.html" title="English"><img src="../IMG/BANDERES/EN.png" alt="English"></a>
        </div>
    </header>

    <!-- Contingut principal de la pàgina -->
    <main>
        <h2 style="font-style: italic;">Make a donation</h2>
        <p><strong>Your contribution helps us keep our services active</strong> and continue helping more young people
            find a home.</p> <!-- Text fet per IA -->

        <form action="#" method="get"> <!-- Formulari per introduir les dades del donatiu -->
            <label for="quantitat">Amount to donate (€):</label> <!-- Text del primer camp del formulari-->
            <input type="number" name="quantitat" min="1" required> <!-- Camp per introduir la quantitat a donar-->

            <label for="nom">Full name:</label> <!-- Text del segon camp del formulari-->
            <input type="text" name="nom" required> <!-- Camp per introduir el nom complet-->

            <label for="email">Email address:</label> <!-- Text del tercer camp del formulari-->
            <input type="email" name="email" required> <!-- Camp per introduir el correu electrònic-->

            <br>
            <fieldset style="border: 1px solid #ccc; padding: 15px; margin-top: 20px;">
                <legend style="color: #0F57A3; font-weight: bold;">Bank details</legend> <!-- Text del títol del fieldset-->
                <label for="titular">Cardholder name:</label> <!-- Text del quart camp del formulari-->
                <input type="text" name="titular" required> <!-- Camp per introduir el titular de la targeta -->

                <label for="targeta">Card number:</label> <!-- Text del cinquè camp del formulari -->
                <input type="text" name="targeta" pattern="[0-9]{16}" placeholder="1234123412341234"
                    required> <!-- Camp per introduir el número de la targeta -->

                <label for="caducitat">Expiry date (MM/YY):</label> <!-- Text del sisè camp del formulari -->
                <input type="text" name="caducitat" pattern="(0[1-9]|1[0-2])\/[0-9]{2}"
                    placeholder="MM/YY" required> <!-- Camp per introduir la data de caducitat -->

                <label for="cvv">CVV:</label> <!-- Text del setè camp del formulari -->
                <input type="text" name="cvv" pattern="[0-9]{3,4}" placeholder="123" required> <!-- Camp per introduir el CVV, el pattern és per a que el navegador accepti només numeros i una longitut de 3 a 4 xifres -->
            </fieldset>

            <button type="submit">Donate now</button> <!-- Botó per enviar el donatiu -->
        </form>
    </main>

    <!-- Peu de pàgina del lloc web -->
    <footer>
        <p>&copy; 2026 viveHOY NGO. All rights reserved.</p>
    </footer>
</body>

</html>
