<!DOCTYPE html>
<html lang="en"> <!-- Fiquem que el lloc sigui en anglès -->
<head>
    <!-- Metadades de la pàgina que fica Visual Studio Code quan fiquem la comanda "!" -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>viveHOY - Donate</title> <!-- Títol del lloc -->
    <link rel="stylesheet" href="../CSS/style.css"> <!-- Enllaç amb l'arxiu CSS -->
</head>
<body>
    <!-- Capçalera del lloc web-->
    <header>
        <div class="logotip">
            <a href="index_en.html"><img src="../IMG/logo-sensefons.webp" alt="viveHOY Logo"></a>
        </div>
        <!-- Navegació del lloc web-->
        <nav>
            <ul>
                <li><a href="index_en.html">Home</a></li>
                <li><a href="nosaltres.html">About us</a></li>
                <li><a href="donar_en.html">Donate</a></li>
                <li><a href="contacte_en.html">Contact</a></li>
            </ul>
        </nav>
        <!-- Botons de canvi d'idioma -->
        <div class="canvi-idioma">
            <a href="../CA/donar_ca.html" title="Català"><img src="../IMG/BANDERES/CA.png" alt="CA"></a>
            <a href="../ES/donar_es.html" title="Español"><img src="../IMG/BANDERES/ES.png" alt="ES"></a>
            <a href="donar_en.html" title="English"><img src="../IMG/BANDERES/EN.png" alt="EN"></a>
        </div>
    </header>

    <!-- Contingut principal de la pàgina -->
    <main>
        <h2>Make a donation</h2>
        <p>Your contribution helps us keep our services active and continue helping more young people find a home.</p> <!-- Text fet per IA -->
        
        <form action="#" method="get">
            <label for="quantitat">Amount to donate (€):</label>
            <input type="number" id="quantitat" name="quantitat" min="1" required>

            <label for="nom">Full name:</label>
            <input type="text" id="nom" name="nom" required>

            <label for="email">Email address:</label>
            <input type="email" id="email" name="email" required>

            <h3 style="margin-top: 30px;">Bank details</h3>
            <label for="titular">Cardholder name:</label>
            <input type="text" id="titular" name="titular" required>

            <label for="targeta">Card number:</label>
            <input type="text" id="targeta" name="targeta" pattern="[0-9]{16}" placeholder="1234123412341234" required>

            <label for="caducitat">Expiry date (MM/YY):</label>
            <input type="text" id="caducitat" name="caducitat" pattern="(0[1-9]|1[0-2])\/[0-9]{2}" placeholder="MM/YY" required>

            <label for="cvv">CVV:</label>
            <input type="text" id="cvv" name="cvv" pattern="[0-9]{3,4}" placeholder="123" required>

            <button type="submit">Donate now</button>
        </form>
    </main>

    <!-- Peu de pàgina del lloc web -->
    <footer>
        <p>&copy; 2026 viveHOY NGO. All rights reserved.</p>
    </footer>
</body>
</html>
