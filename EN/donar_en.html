<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>viveHOY - Donate</title>
    <link rel="stylesheet" href="../CSS/style.css">
</head>
<body>
    <header>
        <div class="logo">
            <a href="index_en.html"><img src="../IMG/logo-sensefons.webp" alt="viveHOY Logo"></a>
        </div>
        <nav>
            <ul>
                <li><a href="index_en.html">Home</a></li>
                <li><a href="nosaltres.html">About us</a></li>
                <li><a href="donar_en.html">Donate</a></li>
                <li><a href="contacte_en.html">Contact</a></li>
            </ul>
        </nav>
        <div class="lang-switch">
            <a href="../CA/donar_ca.html" title="Català"><img src="../IMG/BANDERES/CA.png" alt="CA"></a>
            <a href="../ES/donar_es.html" title="Español"><img src="../IMG/BANDERES/ES.png" alt="ES"></a>
            <a href="donar_en.html" title="English"><img src="../IMG/BANDERES/EN.png" alt="EN"></a>
        </div>
    </header>

    <main>
        <h2>Make a donation</h2>
        <p>Your contribution helps us keep our services active and continue helping more young people find a home.</p>
        
        <form action="#" method="get">
            <label for="quantitat">Amount to donate (€):</label>
            <input type="number" id="quantitat" name="quantitat" min="1" required>

            <label for="nom">Full name:</label>
            <input type="text" id="nom" name="nom" required>

            <label for="email">Email address:</label>
            <input type="email" id="email" name="email" required>

            <button type="submit">Donate now</button>
        </form>
    </main>

    <footer>
        <p>&copy; 2026 viveHOY NGO. All rights reserved.</p>
    </footer>
</body>
</html>
